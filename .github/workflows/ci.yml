name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ${{ matrix.service }}/requirements.txt ruff

      - name: Lint
        run: ruff check ${{ matrix.service }}/

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        run: docker build -t test-${{ matrix.service }} ${{ matrix.service }}/
