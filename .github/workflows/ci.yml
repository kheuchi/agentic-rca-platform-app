name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write       # required for CodeQL SARIF upload

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            requirements: backend/requirements.txt
            lint_path: backend/
          - name: worker
            requirements: worker/requirements.txt
            lint_path: worker/
          - name: chainlit
            requirements: chainlit_ui/requirements.txt
            lint_path: chainlit_ui/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ${{ matrix.requirements }} ruff

      - name: Lint
        run: ruff check ${{ matrix.lint_path }}

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
            context: .
          - name: worker
            dockerfile: worker/Dockerfile
            context: .
          - name: chainlit
            dockerfile: chainlit_ui/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        run: docker build -f ${{ matrix.dockerfile }} -t test-${{ matrix.name }}:${{ github.sha }} ${{ matrix.context }}

      - name: Free disk space for Trivy
        run: |
          docker builder prune -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: test-${{ matrix.name }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          scanners: vuln
          trivyignores: .trivyignore
