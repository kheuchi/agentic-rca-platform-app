name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write          # required for Cosign keyless signing via Sigstore

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build image (local)
        uses: docker/build-push-action@v6
        id: build
        with:
          context: ${{ matrix.service }}/
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Free disk space for Trivy
        run: |
          docker builder prune -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache

      - name: Trivy vulnerability scan (before push)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}:${{ needs.release.outputs.new_release_version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Push image
        run: docker push --all-tags ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}:${{ needs.release.outputs.new_release_version }} \
            | cut -d@ -f2)
          echo "value=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}@${{ steps.digest.outputs.value }}

      - name: Generate SBOM (SPDX)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}@${{ steps.digest.outputs.value }}
          format: spdx-json
          output: sbom-${{ matrix.service }}.spdx.json

      - name: Attest SBOM to image (Cosign)
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.service }}.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}@${{ steps.digest.outputs.value }}

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
