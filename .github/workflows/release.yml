name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write          # required for Cosign keyless signing via Sigstore

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        env:
          DIGEST: ${{ steps.meta.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          image=$(echo "$TAGS" | head -n1)
          cosign sign --yes "${image}@${DIGEST}"

      - name: Trivy vulnerability scan (release image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}@${{ steps.meta.outputs.digest }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Generate SBOM (SPDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}@${{ steps.meta.outputs.digest }}
          format: spdx-json
          output: sbom-${{ matrix.service }}.spdx.json

      - name: Attest SBOM to image (Cosign)
        env:
          DIGEST: ${{ steps.meta.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.service }}.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.service }}@${DIGEST}

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
